
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.cal-wrap { padding: 1rem 0; }
.month-block { margin-bottom: 2rem; }
.month-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.week-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.week-header span { font-size: 12px; color: var(--color-text-secondary); text-align: center; padding: 4px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.day-cell { min-height: 70px; background: var(--color-background-secondary); border-radius: 8px; padding: 6px; border: 0.5px solid var(--color-border-tertiary); }
.day-cell.empty { background: transparent; border-color: transparent; }
.day-cell.today { border-color: var(--color-border-info); }
.day-num { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 4px; }
.day-cell.has-exam .day-num { color: var(--color-text-primary); }
.exam-pill { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-bottom: 2px; line-height: 1.4; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pill-blue { background: #B5D4F4; color: #0C447C; }
.pill-teal { background: #9FE1CB; color: #085041; }
.pill-coral { background: #F5C4B3; color: #712B13; }
.pill-purple { background: #CECBF6; color: #3C3489; }
.pill-amber { background: #FAC775; color: #633806; }
.pill-pink { background: #F4C0D1; color: #72243E; }
.pill-green { background: #C0DD97; color: #27500A; }
.pill-gray { background: #D3D1C7; color: #444441; }
@media (prefers-color-scheme: dark) {
  .pill-blue { background: #0C447C; color: #B5D4F4; }
  .pill-teal { background: #085041; color: #9FE1CB; }
  .pill-coral { background: #712B13; color: #F5C4B3; }
  .pill-purple { background: #3C3489; color: #CECBF6; }
  .pill-amber { background: #633806; color: #FAC775; }
  .pill-pink { background: #72243E; color: #F4C0D1; }
  .pill-green { background: #27500A; color: #C0DD97; }
  .pill-gray { background: #444441; color: #D3D1C7; }
}
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--color-background-primary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); padding: 1.25rem; width: 320px; max-width: 90vw; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.modal-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--color-text-secondary); padding: 0 4px; }
.modal-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; }
.modal-label { color: var(--color-text-secondary); min-width: 60px; }
.modal-val { color: var(--color-text-primary); font-weight: 500; }
</style>

<div class="cal-wrap">
  <div class="legend" id="legend"></div>
  <div id="calendars"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const exams = [
  { date: '2026-04-27', time: '13:35', duration: '1 hr 30', subject: 'Intl Maths P2', full: 'International Maths Extended 22', code: 'IntMathsP22', location: 'SHEA1', cat: 'math' },
  { date: '2026-04-28', time: '13:35', duration: '1 hr 15', subject: 'Chemistry (42)', full: 'Chemistry (42) Extended', code: 'CY42', location: 'SHEA1', cat: 'science' },
  { date: '2026-04-29', time: '13:35', duration: '1 hr 30', subject: 'Maths Ext P4', full: 'Maths Extended 42 (Calculator)', code: 'IntMathsP42', location: 'SHEA1', cat: 'math' },
  { date: '2026-04-30', time: '13:35', duration: '1 hr 15', subject: 'Biology (42)', full: 'Biology (42)', code: '0610', location: 'SHEA1', cat: 'science' },
  { date: '2026-05-05', time: '09:20', duration: '1 hr 45', subject: 'Geography (013)', full: 'Geography (013)', code: 'Geo13', location: 'SHEA1', cat: 'humanities' },
  { date: '2026-05-06', time: '13:00', duration: '2 hrs', subject: 'English P1', full: 'First Language English P12', code: 'EnglishBY', location: 'SHEC1', cat: 'english' },
  { date: '2026-05-07', time: '13:35', duration: '1 hr', subject: 'Chemistry (62)', full: 'Chemistry (62) Alternative to Practical', code: 'CY62', location: 'SHEA1', cat: 'science' },
  { date: '2026-05-07', time: '16:30', duration: '1 hr 45', subject: 'Psychology 1', full: 'Psychology – Cognition and behaviour', code: '81821', location: 'AUDA2', cat: 'psychology' },
  { date: '2026-05-08', time: '13:35', duration: '1 hr 15', subject: 'Physics (Ext)', full: 'Physics Extended', code: 'CY42Physics', location: 'SHEA1', cat: 'science' },
  { date: '2026-05-08', time: '15:15', duration: '1 hr 15', subject: 'World Lit P2', full: 'World Literature Paper 22', code: 'UnseenPoetr', location: 'SHEA1', cat: 'english' },
  { date: '2026-05-12', time: '13:35', duration: '1 hr', subject: 'Biology (62)', full: 'Biology (62)', code: '00610', location: 'SHEA1', cat: 'science' },
  { date: '2026-05-13', time: '09:20', duration: '1 hr 30', subject: 'Geography (023)', full: 'Geography (023)', code: 'Geo23', location: 'SHEA1', cat: 'humanities' },
  { date: '2026-05-13', time: '13:00', duration: '1 hr 30', subject: 'Maths Ext P6', full: 'Maths Extended 62', code: 'IntMathsP62', location: 'SHED8', cat: 'math' },
  { date: '2026-05-14', time: '13:35', duration: '1 hr 30', subject: 'World Lit P3', full: 'World Literature Paper 32', code: 'SetText32', location: 'SHEA1', cat: 'english' },
  { date: '2026-05-14', time: '21:00', duration: '1 hr 45', subject: 'Psychology 2', full: 'Psychology – Social context and behaviour', code: '81822', location: 'AUDA2', cat: 'psychology' },
  { date: '2026-05-15', time: '13:35', duration: '2 hrs', subject: 'English P2', full: 'First Language English P22', code: 'EnglishBY2', location: 'SHEC1', cat: 'english' },
  { date: '2026-05-18', time: '13:00', duration: '2 hrs', subject: 'Add Maths 1', full: 'Additional Mathematics', code: 'AY12AddMa', location: 'SHEA1', cat: 'math' },
  { date: '2026-05-19', time: '13:35', duration: '1 hr', subject: 'Physics Alt P', full: 'Physics Alternative to Practical', code: 'CY62Physics', location: 'SHEA1', cat: 'science' },
  { date: '2026-05-22', time: '09:20', duration: '1 hr 45', subject: 'Physical Ed', full: 'Physical Education', code: 'PE13', location: 'Recital Ha', cat: 'pe' },
  { date: '2026-05-26', time: '13:35', duration: '2 hrs', subject: 'Add Maths 2', full: 'Additional Mathematics', code: 'AY22AddMa', location: 'AUDA2', cat: 'math' },
  { date: '2026-06-03', time: '13:35', duration: '45 mins', subject: 'Physics MCQ', full: 'Physics Multiple Choice Extended', code: 'CY22Physics', location: 'AUDA1', cat: 'science' },
  { date: '2026-06-08', time: '13:35', duration: '45 mins', subject: 'Biology (22)', full: 'Biology (22)', code: '000610', location: 'AUDA1', cat: 'science' },
  { date: '2026-06-09', time: '13:35', duration: '45 mins', subject: 'Chemistry MCQ', full: 'Chemistry (22) Multiple Choice Extended', code: 'CY22', location: 'AUDA1', cat: 'science' },
];

const catStyle = {
  math:       { pill: 'pill-blue',    dot: '#B5D4F4', label: 'Maths' },
  science:    { pill: 'pill-teal',    dot: '#9FE1CB', label: 'Science' },
  english:    { pill: 'pill-coral',   dot: '#F5C4B3', label: 'English' },
  humanities: { pill: 'pill-amber',   dot: '#FAC775', label: 'Humanities' },
  psychology: { pill: 'pill-purple',  dot: '#CECBF6', label: 'Psychology' },
  pe:         { pill: 'pill-green',   dot: '#C0DD97', label: 'PE' },
};

const months = [
  { year: 2026, month: 3, name: 'April 2026' },
  { year: 2026, month: 4, name: 'May 2026' },
  { year: 2026, month: 5, name: 'June 2026' },
];

const legend = document.getElementById('legend');
Object.entries(catStyle).forEach(([k, v]) => {
  legend.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${v.dot}"></div>${v.label}</div>`;
});

function getExams(y, m, d) {
  const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return exams.filter(e => e.date === dateStr);
}

let currentExam = null;
function openExam(idx) {
  const e = exams[idx];
  document.getElementById('modal-title').textContent = e.subject;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row"><span class="modal-label">과목</span><span class="modal-val">${e.full}</span></div>
    <div class="modal-row"><span class="modal-label">날짜</span><span class="modal-val">${e.date}</span></div>
    <div class="modal-row"><span class="modal-label">시간</span><span class="modal-val">${e.time}</span></div>
    <div class="modal-row"><span class="modal-label">시험 시간</span><span class="modal-val">${e.duration}</span></div>
    <div class="modal-row"><span class="modal-label">장소</span><span class="modal-val">${e.location}</span></div>
    <div class="modal-row"><span class="modal-label">코드</span><span class="modal-val">${e.code}</span></div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

const calContainer = document.getElementById('calendars');
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

months.forEach(({ year, month, name }) => {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let html = `<div class="month-block">
    <div class="month-title">${name}</div>
    <div class="week-header">${days.map(d => `<span>${d}</span>`).join('')}</div>
    <div class="cal-grid">`;

  for (let i = 0; i < firstDay; i++) html += `<div class="day-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dayExams = getExams(year, month, d);
    const hasExam = dayExams.length > 0;
    html += `<div class="day-cell${hasExam ? ' has-exam' : ''}">
      <div class="day-num">${d}</div>`;
    dayExams.forEach(e => {
      const idx = exams.indexOf(e);
      const style = catStyle[e.cat] || catStyle.math;
      html += `<div class="exam-pill ${style.pill}" onclick="openExam(${idx})" title="${e.full}">${e.subject}</div>`;
    });
    html += `</div>`;
  }

  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let i = 0; i < remaining; i++) html += `<div class="day-cell empty"></div>`;

  html += `</div></div>`;
  calContainer.innerHTML += html;
});
</script>
